{% load static %}

<html>
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>E-commerce Website</title>

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<nav>

    <div class="logo">
        NovaCart
    </div>

    <form method="GET" action="/">

        <input
            type="text"
            name="q"
            placeholder="Search Products..."
            class="search-box"
        >

    </form>

    <ul>

        <li>
            <a href="/">Home</a>
        </li>

        <li>
            <a href="/cart/">Cart</a>
        </li>

        {% if user.is_authenticated %}

        <li>
            <a href="/logout/">Logout</a>
        </li>

        {% else %}

        <li>
            <a href="/login/">Login</a>
        </li>

        <li>
            <a href="/register/">Register</a>
        </li>

        {% endif %}

    </ul>

</nav>

<div class="container">

    {% block content %}

    {% endblock %}

</div>

</body>
</html>
